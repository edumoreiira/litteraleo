  @if(type() === 'comment') {
    <div class="flex items-center gap-4 flex-wrap">
      <div class="rounded-full size-10.5 bg-primary-100 overflow-hidden">
        <img [src]="profile()?.avatar_url || '/icons/default_user.jpg'" alt="Avatar" class="w-full h-full object-cover"/>
      </div>
      <span class="text-base">{{ profile()?.full_name || 'Usuário' }}</span>
    </div>
  }
  <app-input
  class="bg-white rounded"
  [disabled]="disabled()"
  [(ngModel)]="value"
  type="textarea"
  [rows]="0"
  identifier="comment-textarea"
  placeholder="Deixe sua opinião aqui..."
  (keydown.enter)="$event.preventDefault(); onSubmit()"
  
  ></app-input>
  <button class="self-end px-4 rounded-lg flex items-center gap-2"
  [disabled]="value().length <= 0 || disabled()"
  app-button (click)="onSubmit()">
  <i class="fi text-xs"
  [class.fi-sr-comment-dots]="type() === 'comment'"
  [class.fi-sr-auto-reply]="type() === 'reply'"
  ></i>
    {{ type() === 'comment' ? 'Comentar' : 'Responder' }}
  </button>
