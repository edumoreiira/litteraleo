<div class="flex flex-col bg-popover text-popover-fg border border-border rounded overflow-hidden shadow-xs text-sm box-border"
[ngStyle]="{ 
  'width': customWidth() ? customWidth() : 'auto',
  'min-width': minWidth() ? minWidth() : 'auto',
}"
@popUpCombobox>
@if(searchable()) {
  <div class="p-3 flex items-center gap-2">
    <i class="fi fi-rr-search"></i>
    <input [(ngModel)]="searchValue"
    type="text" class="w-full bg-transparent text-popover-fg placeholder:text-muted-fg outline-none" placeholder="Pesquisar...">
  </div>
  <div class="h-px bg-border w-full"></div>
}
  <div class="flex flex-col p-1 max-h-[20rem]"
  style="scrollbar-width: thin;"
  [ngClass]="{'overflow-auto': filteredOptions().length > 8}">
    @for(option of filteredOptions(); track option.value) {
      <button class="flex items-center gap-2 text-start pl-3 pr-12 py-2 hover:bg-muted transition-colors rounded-lg"
      (click)="handleOptionSelection(option)" @fadeOption>
      <div class="w-3.5 text-start">
        @if(option.active) {
          <i class="fi fi-rr-check" @iconPopUp></i>
        }
      </div>
        {{ option.label }}
      </button>
    }
    @if(filteredOptions().length === 0 ) {
      <span class="px-4 py-2 text-center text-muted-fg" @fadeOption>Nenhum item encontrado...</span>
    }
  </div>
</div>
