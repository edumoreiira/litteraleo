<div class="flex flex-col gap-2">
  <h1 class="text-2xl font-semibold">Entrar</h1>
  <p class="text-muted-fg">Conecte-se rapidamente com uma conta vinculada.</p>
  <div class="flex items-center gap-4">
    <button app-button variant="outline"
    class="flex-1 rounded-lg">
      <img src="./icons/google.png" alt="Ícone do Google" class="h-4.5 mx-auto">
    </button>
    <button app-button variant="outline"
    class="flex-1 rounded-lg">
      <img src="./icons/apple.png" alt="Ícone da Apple" class="h-4.5 mx-auto">
    </button>
  </div>
  <div class="flex items-center gap-4 py-3">
    <div class="h-px flex-1 bg-border"></div>
    <span class="text-muted-fg/80 font-light font-serif italic leading-none">ou continue</span>
    <div class="h-px flex-1 bg-border"></div>
  </div>
</div>
<form class="flex flex-col gap-4"
[formGroup]="loginForm">
  <app-input 
  label="Email"
  identifier="sign-in-login" 
  placeholder="lit@example.com"
  type="email"
  formControlName="email"
  />
  <app-input 
  label="Senha"
  identifier="sign-in-password" 
  type="password"
  formControlName="password"
  />
  <button app-button class="text-base! rounded-lg" type="submit">Entrar</button>
</form>
