<form class="flex flex-col gap-4"
[formGroup]="loginForm"
(submit)="onLoginSubmit()"
>
  <app-input 
  label="Email"
  identifier="sign-in-login" 
  placeholder="lit@example.com"
  type="email"
  formControlName="email"
  />
  <app-input 
  label="Senha"
  identifier="sign-in-password" 
  type="password"
  formControlName="password"
  />
  <button app-button 
  class="text-base! rounded-lg" 
  type="submit"
  [disabled]="loginForm.invalid"
  >Entrar</button>
</form>
