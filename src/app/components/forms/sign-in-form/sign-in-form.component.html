<form class="flex flex-col gap-4"
[formGroup]="loginForm"
(submit)="onLoginSubmit()"
>
  <app-input 
  label="Email"
  identifier="sign-in-login" 
  type="email"
  formControlName="email"
  />
  <app-input 
  label="Senha"
  identifier="sign-in-password" 
  type="password"
  formControlName="password"
  />
  <button app-button
  style="view-transition-name: auth-submit-btn"
  class="text-base! rounded-lg" 
  type="submit"
  [disabled]="!loginForm.valid"
  >Entrar</button>
</form>
