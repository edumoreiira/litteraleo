<h1 class="text-xl font-semibold">
  {{ mode() === 'create' ? 'Novo Livro' : 'Editar Livro' }}
</h1>
<div class="flex gap-4">
  <input 
  #coverImageInput
  type="file"
  accept="image/png, image/jpg, image/jpeg"
  class="hidden"
  (change)="onCoverImageSelected($event)"
  >
  <div 
  class="xs:w-34 w-26 aspect-5/8 bg-neutral-200 rounded-xl shrink-0 self-start cursor-pointer relative group"
  role="button"
  aria-label="Selecione a capa do livro"
  tabindex="0"
  (keydown.enter)="coverImageInput.click()"
  (keydown.space)="coverImageInput.click()"
  (click)="coverImageInput.click()">
    @if(bookHoverUrl()) {
      <img class="w-full h-full rounded-xl object-cover"
      [src]="bookHoverUrl()" alt="Capa do Livro">
      <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 text-neutral-100 rounded-xl transition-all flex flex-col gap-2 items-center justify-center">
        <i class="fi fi-br-rotate-right flex"></i>
        <p>Alterar capa</p>
      </div>
    } @else {
      <div class="w-full h-full flex flex-col justify-center items-center gap-1 p-2 text-neutral-500 hover:text-neutral-700 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 00-9.78 2.096A4.001 4.001 0 003 15zM15 19l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <p class="text-sm text-center">Selecione a capa do livro</p>
      </div>
    }
  </div>

  <div class="flex flex-col justify-between gap-4" [formGroup]="bookForm">
    <app-input 
    identifier="book_name"
    label="Título" 
    placeholder="Sherlock Holmes"
    formControlName="title"
    ></app-input>
    <app-input 
    identifier="book_author" 
    label="Autor" 
    placeholder="Arthur Conan Doyle"
    formControlName="author"
    ></app-input>
    <div class="flex gap-2 flex-wrap">
      <app-input 
      identifier="book_year_release" 
      type="number" 
      label="Ano de Lançamento" 
      placeholder="1892" 
      class="flex-[1_1_150px]"
      formControlName="publication_year"
      ></app-input>
      <app-input 
      identifier="book_pages" 
      type="number" 
      label="Páginas" 
      placeholder="350" 
      class="flex-[1_1_150px]"
      formControlName="pages"
      ></app-input>
    </div>
  </div>
</div>
<button app-button class="self-end mt-4 px-5 py-2"
[disabled]="!bookForm.valid || (!coverImageFile && !bookHoverUrl())"
(click)="onSubmit()"
>{{ mode() === 'create' ? 'Criar Livro' : 'Salvar Alterações' }}</button>
