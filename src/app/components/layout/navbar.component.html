    [ngStyle]="{'transform': 'translateY(' + -navbarOffset() + 'px)'}"> -->
    <div class="flex items-center gap-4 shrink-0">
        <a routerLink="/" 
        class="block text-3xl font-bold text-primary font-[Abril_Fatface]">litteraleo</a>
    </div>

    
    <div class="flex items-center gap-3 lg:gap-4">
        <ul class="hidden lg:flex items-center gap-8 text-muted-fg font-medium mr-8">
            <li><a class="hover:text-primary transition-colors" 
                routerLink="/">Home</a></li>
            <li><a class="hover:text-primary transition-colors" 
                routerLink="/resenhas">Resenhas</a></li>
            <li><a class="hover:text-primary transition-colors" 
                href="#">Sobre</a></li>
        </ul>

        <a *appHasRole="['admin', 'writer']"
        aria-label="Criar Resenha"
        app-button variant="contained" class="font-sans! font-bold! not-italic!" routerLink="/nova-resenha">+</a>

        <app-searchbar class="sm:block sm:w-[210px]" [mobileView]="640"/>
        @if(!isUserLoggedIn()) {
            <div class="flex items-center gap-2">
                <button app-button size="base"
                (click)="openLoginModal()">Login</button>
                <button app-button size="base" variant="text"
                (click)="openSignUpModal()">Registrar</button>
            </div>
        } @else {
            <app-user-icon [imgUrl]="user()?.user_metadata?.avatar_url || '' " 
            (logout)="logout()"
            />
        }
    </div>
