<div class="py-8 px-12 sm:px-16 lg:px-20 text-primary-500 flex flex-col sm:flex-row justify-between items-center sm:gap-6 gap-4 border-t border-border/40 flex-wrap">
  <div>
    <h2 appTitle size="sm">litteraleo</h2>
    <div class="flex flex-col text-primary-300">
      <p class="text-xs font-serif italic leading-none">desenvolvido por</p>
      <a class="text-xs font-serif italic font-medium leading-[1.2] hover:opacity-70 transition-opacity"
      target="_blank"
      rel="noopener noreferrer"
      href="https://github.com/edumoreiira/">Eduardo Moreira</a>
    </div>
  </div>
  <p class="text-center font-serif italic font-medium sm:block hidden">
    &copy; 2026 todos os direitos reservados.
  </p>
  <ul class="flex items-center sm:gap-6 gap-8">
    @for(social of socials; track $index) {
      <li>
        <a
          [href]="social.url"
          target="_blank"
          rel="noopener noreferrer"
          class="text-2xl text-primary-500 hover:opacity-70 transition-opacity"
          attr.aria-label="{{ social.name }}"
        >
          <i class="fi flex {{ social.icon }}"></i>
        </a>
      </li>
    }
  </ul>
  <p class="text-center font-serif italic font-medium sm:hidden">
    &copy; 2026 todos os direitos reservados.
  </p>

</div>
