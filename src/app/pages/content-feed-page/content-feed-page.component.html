@let padding = 'md:py-22 py-12';
<main class="page-container {{ padding }}">
  <div class="flex lg:flex-row flex-col gap-4 justify-between">
    <div class="flex gap-x-2 gap-y-4 sm:flex-row flex-col-reverse sm:items-stretch items-start">
      <app-searchbar class="flex lg:w-[400px] w-full"
      [value]="searchQuery().search_text || ''"
      (valueChange)="updateSearchBar($event)"
      placeholder="Pesquisar pelo título, autor ou palavra-chave..."/>
      <em-button-toggle-group
      name="content-feed-filter"
      class="font-serif italic font-light shadow-xs shrink-0"
      aria-label="Filtro de busca"
      variant="contained"
      em-button-toggle-animation
      [(ngModel)]="filterOptions"
      (change)="searchFilterOption($event)"
      >
        <button 
        em-button-toggle 
        value="reviews"
        active="text-primary-50"
        >resenhas</button>
        <button 
        em-button-toggle
        value="posts"
        active="text-primary-50"
        >artigos</button>
        <button
        em-button-toggle
        value="both"
        active="text-primary-50"
        >ambos</button>
      </em-button-toggle-group>
    </div>
    
    <div class="flex gap-2 overflow-hidden">
      <button class="flex items-center justify-between gap-1 flex-1 md:flex-auto min-w-0" size="base"
      app-button variant="outline_static" appCombobox [options]="rateOptions()"
      [allowMultipleOptions]="false" label="avaliações"
      [dumbComponent]="true"
      [searchable]="false"
      (updatedLabel)="labelAvaliacoes.set($event)"
      (activeOptions)="searchRateOptions($event)"
      >
        <span class="md:max-w-[200px] w-fit whitespace-nowrap overflow-hidden text-ellipsis font-light">{{ labelAvaliacoes() }}</span>
        <i class="fi fi-rr-caret-down"></i>
      </button>
      <button class="flex items-center justify-between gap-1 flex-1 md:flex-auto min-w-0" size="base"
      app-button variant="outline_static" appCombobox [options]="categoryOptions()"
      [allowMultipleOptions]="true" label="todas as categorias"
      [dumbComponent]="true"
      (updatedLabel)="labelCategorias.set($event)"
      (activeOptions)="searchCategoriesOptions($event)"
      >
        <span class="md:max-w-[200px] w-fit whitespace-nowrap overflow-hidden text-ellipsis font-light">{{ labelCategorias() }}</span>
        <i class="fi fi-rr-caret-down"></i>
      </button>
    </div>
  </div>

  <section class="flex flex-wrap gap-4 my-10">
    @for (feed of displayedFeed(); track feed.id) {
      <article app-card-review
      class="flex-[1_1_375px] hover:ring-1 hover:ring-primary/70 hover:scale-101 transition-all cursor-pointer p-6"
      [author_name]="feed.author.short_name"
      [author_avatar]="feed.author.avatar_url || './icons/default_user.jpg'"
      [title]="feed.title"
      [book_author]="feed.book?.author || ''"
      [content]="feed.content"
      [rating]="feed.rating || 0"
      [tags]="feed.categories || []"
      [type]="feed.type"
      [created_at]="feed.created_at"
      (click)="navigateToContent(feed.type, feed.slug)"
      ></article>
    }
  </section>

  <div class="grid justify-end">
    <app-paginator
    [shadow]="true"
    [limit]="totalPages()"
    (getCurrentPage)="onPageChange($event)"
    />
  </div>
  
  
</main>
