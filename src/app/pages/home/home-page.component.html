<!-- variables -->
@let paddingFirst = 'pt-20 lg:pt-30 pb-20 lg:pb-24';
@let padding = 'lg:py-20 py-12';
@let paddingLast = 'lg:pt-20 pt-12 pb-24 lg:pb-30';
<!-- variables -->
<main class="page-container {{ paddingFirst }}">
<app-hero/>
</main>



<!--  -->

<section class="page-container {{ padding }}">
  <div class="flex flex-col items-center lg:gap-8 sm:gap-6 gap-4">
    <h1 appTitle>Últimos textos</h1>
    <app-card-slider>
      @for (item of latestFeed(); track $index) {
        <article
        [class]="$index === 0 ? 'snap-start'
        : ($index === latestFeed().length - 1
        ? 'snap-end' : 'snap-center')"
        #card
        [title]="item.title"
        [book_cover]="getCoverImage(item)"
        [description]="item.description"
        [author_avatar]="item.author.avatar_url"
        [author_name]="item.author.short_name"
        [book_author]="getBookAuthor(item)"
        [content]="item.content"
        [rating]="getRating(item)"
        [created_at]="item.created_at"
        [url]="getUrl(item)"
        [type]="item.type"
        app-card-review layout="minimal" class="flex-1 min-w-[24.3rem]"></article>
      }
    </app-card-slider>
    <button
      app-button
      variant="contained"
      size="lg"
      class="flex items-center gap-2"
      routerLink="/resenhas"
      [queryParams]="{ search_type: 'both' }"
    >
    <i class="fi fi-sr-feedback-alt text-sm"></i>
    Ver todos os textos
    </button>
  </div>
</section>
